name: people_counter_analytics
description: "A beautiful, cross-platform dashboard for analyzing people counter data."
publish_to: 'none' # Prevents accidental publishing

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Default iOS-style icons
  cupertino_icons: ^1.0.8

  # --- OUR CUSTOM PACKAGES ---
  # Used for drawing the beautiful data charts
  fl_chart: ^0.65.0
  # Used for selecting the .scb data folder on Windows/Android
  file_picker: ^6.1.1
  archive: ^3.6.1
  shared_preferences: ^2.2.2
  pdf: ^3.11.0
  printing: ^5.11.1
  ftp_server: ^2.1.1
  minio: ^3.5.8
  path: ^1.9.1
  webview_flutter: ^4.7.0
  url_launcher: ^6.2.5
  webview_windows: ^0.3.0
  excel: ^4.0.0
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  file_saver: ^0.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Tool for generating app icons across all platforms
  flutter_launcher_icons: ^0.13.1

# --- FLUTTER LAUNCHER ICONS CONFIGURATION ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_size: 21
  web:
    generate: true
    image_path: "assets/app_icon.png"
    background_color: "#0F172A"
    theme_color: "#0F172A"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/app_icon.png"

flutter:
  # Ensures that the Material Design icons are included
  uses-material-design: true
  generate: true
  assets:
    - assets/boitex_logo.png
    - assets/app_icon.png
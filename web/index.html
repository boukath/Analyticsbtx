<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BoitexInfo Analytics">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>BoitexInfo Analytics</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
<style>
  body {
    background-color: #0F172A; /* Your dark background */
    color: white;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .logo-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeIn 2s ease-in-out;
  }

  .logo {
    width: 150px;
    height: 150px;
    margin-bottom: 32px;
  }

  .title {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 1.5px;
    color: white;
  }

  .subtitle {
    font-size: 16px;
    font-weight: bold;
    color: #06B6D4; /* Cyan accent */
    letter-spacing: 4px;
    margin-bottom: 48px;
  }

  .spinner {
    border: 4px solid rgba(255, 255, 255, 0.1);
    border-top: 4px solid #06B6D4;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
  }

  .loading-text {
    color: rgba(255, 255, 255, 0.54);
    font-size: 14px;
    margin-top: 16px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>

<div class="logo-container">
  <img src="icons/Icon-192.png" class="logo" alt="BoitexInfo Logo">
  <div class="title">BoitexInfo</div>
  <div class="subtitle">ANALYTICS</div>
  <div class="spinner"></div>
  <div class="loading-text">Loading Cloud Dashboard...</div>
</div>

<script src="flutter_bootstrap.js" async></script>
</body>
</html>
